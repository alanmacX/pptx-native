<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
  .slide{position:relative;width:1280px;height:720px;background:#FFFFFF;overflow:hidden;}
  .ppt-textbox{position:absolute;color:#0F1B2D;line-height:1.4;}
  .ppt-shape{position:absolute;}
  .t{left:80px;top:60px;width:1000px;font-size:28px;font-weight:800;}
</style>
</head>
<body>

<!-- layers -->
<section class="slide" data-slide="1" data-ppt-transition="type:fade">
  <div class="ppt-textbox t">motif: layers（自顶向下层叠级联）</div>
  <div data-ppt-motif="layers; from:top; dur:460; gap:70">
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:200px;top:150px;width:880px;height:80px;background:#E4F4F1;border-radius:10px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:200px;top:244px;width:880px;height:80px;background:#EAF1FB;border-radius:10px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:200px;top:338px;width:880px;height:80px;background:#E4F4F1;border-radius:10px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:200px;top:432px;width:880px;height:80px;background:#EAF1FB;border-radius:10px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:200px;top:526px;width:880px;height:80px;background:#E4F4F1;border-radius:10px;"></div>
  </div>
</section>

<!-- comparison -->
<section class="slide" data-slide="2" data-ppt-transition="type:fade">
  <div class="ppt-textbox t">motif: comparison（左右对称入场，分隔线最后）</div>
  <div data-ppt-motif="comparison; dur:520; gap:120">
    <div class="ppt-shape" data-ppt-role="left"  data-shape="roundRect" style="left:120px;top:170px;width:460px;height:120px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:14px;"></div>
    <div class="ppt-shape" data-ppt-role="left"  data-shape="roundRect" style="left:120px;top:310px;width:460px;height:120px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:14px;"></div>
    <div class="ppt-shape" data-ppt-role="left"  data-shape="roundRect" style="left:120px;top:450px;width:460px;height:120px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:14px;"></div>
    <div class="ppt-shape" data-ppt-role="center" data-shape="rect" style="left:638px;top:170px;width:3px;height:400px;background:#CBD5E1;"></div>
    <div class="ppt-shape" data-ppt-role="right" data-shape="roundRect" style="left:700px;top:170px;width:460px;height:120px;background:#0F1B2D;border-radius:14px;"></div>
    <div class="ppt-shape" data-ppt-role="right" data-shape="roundRect" style="left:700px;top:310px;width:460px;height:120px;background:#0F1B2D;border-radius:14px;"></div>
    <div class="ppt-shape" data-ppt-role="right" data-shape="roundRect" style="left:700px;top:450px;width:460px;height:120px;background:#0F1B2D;border-radius:14px;"></div>
  </div>
</section>

<!-- metricCluster -->
<section class="slide" data-slide="3" data-ppt-transition="type:fade">
  <div class="ppt-textbox t">motif: metricCluster（指标卡轻柔上浮）</div>
  <div data-ppt-motif="metricCluster; dur:520; gap:90">
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:120px;top:200px;width:240px;height:160px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:16px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:392px;top:200px;width:240px;height:160px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:16px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:664px;top:200px;width:240px;height:160px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:16px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:936px;top:200px;width:240px;height:160px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:16px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:256px;top:392px;width:240px;height:160px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:16px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:528px;top:392px;width:240px;height:160px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:16px;"></div>
    <div class="ppt-shape" data-ppt-role="item" data-shape="roundRect" style="left:800px;top:392px;width:240px;height:160px;background:#F5F7FA;border:1px solid #E2E8F0;border-radius:16px;"></div>
  </div>
</section>

</body>
</html>
